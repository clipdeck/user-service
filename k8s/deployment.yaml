apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: clipdeck
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: clipdeck
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: user-service
          image: registry.digitalocean.com/clipdeck/user-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3007
              protocol: TCP
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '3007'
            - name: HOST
              value: '0.0.0.0'
            - name: LOG_LEVEL
              value: 'info'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: clipdeck-db-user
                  key: POOLED_URL
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: clipdeck-db-user
                  key: DIRECT_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clipdeck-auth
                  key: JWT_SECRET
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: clipdeck-rabbitmq
                  key: RABBITMQ_URL
            - name: EVENT_EXCHANGE
              value: 'clipdeck.events'
            - name: ALLOWED_ORIGINS
              value: 'https://clipdeck.ar,https://www.clipdeck.ar'
            - name: DISCORD_SERVICE_URL
              value: 'http://discord-service.clipdeck.svc.cluster.local:3006'
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '500m'
      imagePullSecrets:
        - name: clipdeck-registry
