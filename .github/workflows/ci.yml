name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Build, Test & Docker
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clipdeck_test
          POSTGRES_USER: clipdeck_test
          POSTGRES_PASSWORD: clipdeck_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout user-service
        uses: actions/checkout@v4
        with:
          path: service

      - name: Checkout shared-types
        uses: actions/checkout@v4
        with:
          repository: clipdeck/shared-types
          path: shared-types

      - name: Checkout shared-events
        uses: actions/checkout@v4
        with:
          repository: clipdeck/shared-events
          path: shared-events

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: service/package-lock.json

      - name: Build shared-types
        working-directory: shared-types
        run: npm ci && npm run build

      - name: Build shared-events
        working-directory: shared-events
        run: npm ci && npm run build

      - name: Install dependencies
        working-directory: service
        run: npm ci

      - name: Run Prisma migrations
        working-directory: service
        env:
          DATABASE_URL: postgresql://clipdeck_test:clipdeck_test@localhost:5432/clipdeck_test
          DIRECT_URL: postgresql://clipdeck_test:clipdeck_test@localhost:5432/clipdeck_test
        run: npx prisma migrate deploy

      - name: TypeScript typecheck
        working-directory: service
        run: npm run typecheck

      - name: Lint
        working-directory: service
        run: npm run lint || true

      - name: Run tests
        working-directory: service
        env:
          DATABASE_URL: postgresql://clipdeck_test:clipdeck_test@localhost:5432/clipdeck_test
          DIRECT_URL: postgresql://clipdeck_test:clipdeck_test@localhost:5432/clipdeck_test
        run: npm run test:coverage

      - name: Docker build check
        run: |
          mkdir -p _ctx/shared-types _ctx/shared-events _ctx/service
          cp -r shared-types/. _ctx/shared-types/
          cp -r shared-events/. _ctx/shared-events/
          cp -r service/. _ctx/service/ 2>/dev/null || true
          rm -rf _ctx/service/_ctx
          docker build -t clipdeck/user-service:ci -f _ctx/service/Dockerfile _ctx

      - name: Security audit
        working-directory: service
        run: npm audit --audit-level=high
