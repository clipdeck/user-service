name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Build, Test & Docker
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clipdeck
          POSTGRES_PASSWORD: clipdeck_dev
          POSTGRES_DB: clipdeck_user_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout user-service
        uses: actions/checkout@v4
        with:
          path: service

      - name: Checkout shared-types
        uses: actions/checkout@v4
        with:
          repository: clipdeck/shared-types
          path: shared-types

      - name: Checkout shared-events
        uses: actions/checkout@v4
        with:
          repository: clipdeck/shared-events
          path: shared-events

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: service/package-lock.json

      - name: Build shared-types
        working-directory: shared-types
        run: npm ci && npm run build

      - name: Build shared-events
        working-directory: shared-events
        run: npm ci && npm run build

      - name: Install dependencies
        working-directory: service
        run: npm ci

      - name: TypeScript typecheck
        working-directory: service
        run: npm run typecheck

      - name: Lint
        working-directory: service
        run: npm run lint

      - name: Run tests with coverage
        working-directory: service
        run: npm run test:coverage

      - name: Docker build
        working-directory: service
        run: |
          mkdir -p _docker-context/shared-types _docker-context/shared-events _docker-context/service
          cp -r ../shared-types/. _docker-context/shared-types/
          cp -r ../shared-events/. _docker-context/shared-events/
          cp -r . _docker-context/service/ 2>/dev/null || true
          rm -rf _docker-context/service/_docker-context
          cp Dockerfile _docker-context/Dockerfile
          docker build -t clipdeck/user-service:ci _docker-context

      - name: Security audit
        working-directory: service
        run: npm audit --audit-level=high
